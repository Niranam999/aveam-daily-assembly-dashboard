<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVEAM - Mobile Assembly Report Portal</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: var(--bg-primary);
            font-family: 'Outfit', 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
            overflow-y: auto;
        }
        .mobile-portal-container {
            width: 100%;
            max-width: 480px; /* Comfortably fits phone and small tablet widths */
            min-height: 100vh;
            background-color: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            padding: 1.25rem 1rem;
            box-sizing: border-box;
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.4);
            border-left: 1px solid var(--card-border);
            border-right: 1px solid var(--card-border);
        }
        .phone-app {
            height: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .phone-app-header {
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--card-border);
        }
        .phone-app-header h2 {
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--text-title) 30%, var(--brand-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .phone-app-header p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.15rem;
        }
        .job-select-wrapper {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="mobile-portal-container">
        <div class="phone-app">
            
            <header class="phone-app-header">
                <h2>AVEAM Update Portal</h2>
                <p>ระบบบันทึกรายงานความคืบหน้าการประกอบรายวัน</p>
            </header>

            <!-- STATE 0: Job Manual Selection (Only shows if no ?job= in URL) -->
            <div id="job-selector-state" class="job-select-wrapper" style="display: none;">
                <div class="form-group">
                    <label class="form-label" for="select-job-manual">เลือกจ๊อบที่ต้องการอัปเดต (WIP Jobs)</label>
                    <select class="form-select" id="select-job-manual" onchange="handleManualJobSelect()">
                        <!-- Filled dynamically by JS -->
                    </select>
                </div>
            </div>

            <!-- STATE 1: Progress Update Form -->
            <form class="mobile-form" id="mobile-form" style="display: none;" onsubmit="submitProgressUpdate(event)">
                
                <div class="form-group">
                    <span class="form-label">โครงการ / ลูกค้า</span>
                    <div class="form-input-info" id="form-project-title">-</div>
                </div>
                
                <div class="form-group">
                    <span class="form-label">Job Number</span>
                    <div class="form-input-info" id="form-job-no">-</div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                    <div class="form-group">
                        <span class="form-label">MC Number</span>
                        <div class="form-input-info" id="form-mc-number">-</div>
                    </div>
                    <div class="form-group">
                        <span class="form-label">Build Leader</span>
                        <div class="form-input-info" id="form-build-leader">-</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="select-operator">ผู้รายงาน</label>
                    <select class="form-select" id="select-operator" required>
                        <!-- Filled by JS -->
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="input-employee-id">รหัสพนักงาน (Employee ID)</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]*" class="form-input" id="input-employee-id" placeholder="กรอกรหัสพนักงาน 7-8 หลัก" required>
                </div>
                
                <div class="form-group">
                    <span class="form-label">ความคืบหน้าพาร์ทประกอบย่อย (%)</span>
                    <div id="sub-sliders-container" style="max-height: 250px; overflow-y: auto; padding-right: 0.2rem;">
                        <!-- Sliders filled by JS based on selected job -->
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="input-qty-done">จำนวนที่ทำเสร็จวันนี้ (Finish Goods)</label>
                    <input type="number" class="form-input" id="input-qty-done" placeholder="จำนวน (หน่วย - ใส่ค่าติดลบเพื่อปรับลดได้)" value="0">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="select-issue">ปัญหาที่พบหน้างาน (ถ้ามี)</label>
                    <select class="form-select" id="select-issue">
                        <option value="none">🟢 ปกติ (ไม่มีปัญหา)</option>
                        <option value="parts">🔴 ชิ้นงานไม่ครบ / รอพาร์ท</option>
                        <option value="drawing">🔴 แบบวิศวกรรมมีจุดผิดพลาด</option>
                        <option value="machine">🔴 เครื่องมือหรือเครื่องจักรขัดข้อง</option>
                        <option value="other">🔴 ปัญหาอื่นๆ (ระบุในหมายเหตุ)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="textarea-note">บันทึกช่วยจำ / รายละเอียดงาน</label>
                    <textarea class="form-textarea" id="textarea-note" rows="3" placeholder="อัปเดตขั้นตอนประกอบ หรือระบุอาการปัญหา..."></textarea>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr; gap: 0.5rem; margin-top: 1rem;">
                    <button type="submit" class="submit-btn" style="padding: 0.75rem; font-size: 0.9rem; font-weight: 600; width: 100%; height: 44px;">
                        💾 บันทึกรายงานความคืบหน้า
                    </button>
                </div>
            </form>
            
            <!-- STATE 2: Success Feedback Screen -->
            <div class="success-screen" id="success-screen" style="display: none; flex: 1; flex-direction: column; justify-content: center; align-items: center;">
                <div class="success-icon-wrap" style="width: 50px; height: 50px; margin-bottom: 1rem;">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h3>บันทึกรายงานสำเร็จ!</h3>
                <p style="text-align: center; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; max-width: 80%;">
                    ข้อมูลความคืบหน้าถูกบันทึกไปยังฐานข้อมูลคลาวด์และ Google Sheets หน้าจอแดชบอร์ดฝ่ายผลิตอัปเดตแล้ว
                </p>
                <button class="submit-btn" onclick="resetFormState()" style="margin-top: 1.5rem; width: auto; padding: 0.5rem 1.25rem; font-size: 0.75rem;">
                    ↩️ กลับไปรายงานผลจ๊อบถัดไป
                </button>
            </div>
            
            <!-- Loading Indicator -->
            <div id="loading-state" style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--text-secondary);">
                <div class="time-badge" style="border: none;">
                    <span class="live-dot" style="animation: pulse 1s infinite;"></span>
                    <span>กำลังโหลดข้อมูล...</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Load Supabase JS Client SDK via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Load custom mobile update app JS -->
    <script src="update_app.js"></script>
</body>
</html>
